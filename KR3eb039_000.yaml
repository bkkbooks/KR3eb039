front:
  text: 鬼真君脈訣序脈訣自王叔和傳後世鮮其人誰知叔和止注脈經誤傳有脈訣也叔和既無脈訣何傳訣而不傳經以脈經之多不及脈訣之約也然脈經始於高陽生非叔和原文也鐸遇雲中逸老於燕市傳法之備而不傳脈經者以素問靈樞二書言脈之多也雖然於多之中而求其約安在必求脈於靈素哉鬼真君名臾區雲中逸老弟子也貌甚奇面長尺有一寸發短而鬈深目鼻高耳垂下且大非凡近士也且岐天師備傳方法何不傳於鐸因授是書皆切脈法也夫真君為天師之徒天師傳道之備胡真君傳脈之約乎蓋病分臟腑若脈則傳臟而不及腑寧脈與病異哉不知病必兼臟而脈不可兼臟也靈素二書有時合而言之何今傳脈訣獨與病殊乎以臟病而腑亦病腑病而臟亦病故治臟而腑在其中切臟而腑亦在其內又何必合言之所以單言臟而不及腑也真君之傳雖出於天師亦真君之獨見也傳止五篇其言約矣然皆言臟之文治臟不可通之治腑哉山陰陳士鐸敬之甫別號遠公題於文筆峰之小琅琊
