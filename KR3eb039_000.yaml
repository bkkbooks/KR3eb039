body:
  text: 洞垣全書脈訣闡微第一篇鬼真君曰脈理甚微原非一言可盡人病多變又豈一脈能包論其陰陽別其生死察其臟腑觀其症候既上中下之宜分必寸關尺之自定左寸心左關肝火木寧無至性右寸肺右關脾土金本有深情惟兩尺為腎水火實難分配中間是命左右還可同觀三焦別上中下以相診余經合寸關尺而共視蓋部位烏容倒置辨貴分明而表裡何必細分不宜拘執雖按指以三部為法數息便悟斷經顧看脈以五臟為主知臟即通治腑察四令之節氣春夏異於秋冬審一日之晷時寅卯殊於申酉大約逢克則凶逢生可救我生則緩我克難醫因五行而推斷舉一隅而可知弦似乎緊澀似乎微浮與芤相反沉與伏寧殊洪同實狀弱帶濡形辨之既清病將安遁故急則為痛弦則為風緊則為邪緩則為虛微則為冷數則為熱滑則痰多澀則鬱塞洪為火旺大為血乾沉為陰寒遲為困乏小者氣衰細者血涸浮者氣升伏者脈結芤多失血實多壅氣弱是陰虧濡是濕犯長是正氣之和短是邪氣之克代為正氣之衰革為正氣之脫結為邪氣之搏促為正氣之耗動有變動之機靜有安寧之喜毛主火之將旺石乃水之極沉耎是力薄堅是邪深鉤為氣血之和躁為氣血之燥搏擊指而有太過之虞散去指而無可留之狀脈嫌其絶脈貴其平既知各脈之異同可斷諸症之常變然而診脈必須得時要在日之平旦按指原無異法貴取氣之甚清自然虛實易明盛衰易辨矣陳士鐸曰脈理之不明也久矣以致看病不真用藥寡效是脈之精微不可不講也然而精微出於淺近過求乎窈杳反致失之此鬼真君脈訣之妙妙在淺近使人人易知而深入也又曰脈有陰陽之不同王叔和分七表八里似乎切脈之分明不知無一脈無陰陽非浮為陽而沉為陰遲為陰而數為陽也陰中有陽陽中有陰於中消息全在臨症時察之心可意會非筆墨能繪畫耳又曰十二經各有脈分十二經看之自然玄妙入神然一而過求其精反失其約蓋五臟之脈能統攝七腑腑病治臟臟安而腑自安故脈訣止消言臟而不必言腑也又曰切脈以呼吸為準一呼脈二動一吸脈二動為是平人無病之脈有餘不及皆病也世人切脈多以三指齊按於寸關尺以候各脈焉得備觀其陰陽虛實邪正之分哉必須先以一指觀其左寸後及左關又及左尺然後又及右寸又及右關又及右尺逐部分別再以三指准之則何異何同始瞭然於胸中見浮言其風見沉言其積見遲言其痛見數言其熱自能陰陽莫逃邪正有別虛實不淆矣又曰春夏秋冬長夏各有定脈內經已詳言之矣春主弦也夏主鉤也鉤即微洪之意秋主毛也冬主石也長夏主耎弱也太過不及均是病徵尤不可見者克我之脈也如春宜弦而見毛夏宜鉤而見石及至秋冬未有不病者余可類推矣又曰脈隨血而行而血隨時而運病脈行至克我之脈則病必重行至生我之脈則病必輕蓋金脈逢金時必旺木脈逢金時必衰故木病值寅卯則木當其令逢申酉則木失其時觀寅卯申酉之旺衰即知金木之病情症候矣即一木而可通之火土水金即寅卯申酉而可通之子午巳亥辰戌丑未也矣又曰臟腑之病雖各不同要不外五行之生克逢生則病易愈也逢克則病難痊也我生則泄我之氣我克則勞我之神臟腑為戰爭之地胸腹為角鬥之場敵則掃除而斬殺甚多傷損必過矣調停於生克之間和解於敗亡之內仍於金木水火土而善用之也又曰脈有相似而實不相同者尤宜分辨蓋脈似相同而病實各異一經錯認死生反掌可不慎歟又曰脈之祕訣大約三十八字盡之而每字實有祕要非一言可盡也既非一言可盡而鬼真君何以每一字皆用一言以詔示天下豈脈訣貴少而不貴多乎不知訣不必太多而論訣正不必太少也又曰急則為痛言見急脈即為痛病也急似乎數而未至於數也急似乎緊而未至於緊也有不可緩之狀乃氣與火相鬥邪與正相戰也又曰弦則為風弦乃春天之正脈春天見弦脈正風木之得令非病也苟見於夏秋冬季則弦為風矣又曰緊則為邪邪者亦風之類但風邪感之甚驟則脈必現緊耳又曰緩則為虛虛者重按之不能鼓指也鼓指亦非太徑之謂言其不能微微鼓指耳最宜活看又曰微則為冷冷者寒也不論何部見微脈者多是寒症又曰數則為熱熱乃火病火性炎上其性最速故數脈作熱論也但數有不同有陰數陽數之異有初數久數之分然而熱則一也又曰滑則痰多天下至滑者無過於水痰亦水也水多則痰生痰多則滑見宜也然而水病不一滑脈不常何故單以痰多屬之滑也不知水未結痰其體靜水既結痰其體動也動極則滑極脈見滑矣非痰多而何又曰澀則鬱塞澀脈乃往來之不甚舒暢也此陰陽不和氣血不達外感於風寒內阻於憂鬱抑塞而不通鬱而未發之狀六部見此象俱能成病而尤於肝經不宜一見澀脈即以解鬱通塞之藥急治之則隨手見功也又曰洪為火旺洪者來大而去數也洪與大有分按指若大久之而不見其大止見其數重按之不見其數而仍見其大者為洪也夏見此脈為宜否則皆火旺之極也又曰大為血乾大者重按而仍洪也火之有餘乃血之不足血不能制火乃見大脈在夏天則猶非大忌然見大脈即宜補血滋陰以水伏火之為得耳又曰沉為陰寒沉者至深之象深則未有不陰陰則未有不寒者也入石洞而陰寒逼人者正以其深沉耳又曰遲為困乏遲者言俟之而不能進也行百里者半九十非遲之之謂乎是其力乏神困欲進而不能非可進而不肯進也又曰小者氣衰小脈言脈之小而不能大也氣不充之故耳又曰細脈言脈之細而不能粗也江河細流正水縮也人身之血少自然脈細矣又曰浮脈指按即得氣舉而升之也又曰伏脈指按始終不可得或隱隱約約或有或無者是邪氣搏結正氣而不能出也用藥出之者生然出之驟亦非佳兆又曰芤脈中空如無也血失則內無血養安得不中空乎又曰實脈不獨按指有力且有不可止抑之狀非正氣之有餘乃邪氣之有餘也邪氣有餘自然壅阻正氣矣又曰弱脈不能強旺之狀陰虛而不敢與陽氣相爭也又曰濡脈言其濡滯也濕則霑濡非歟又曰長脈之現正氣之和也有胃氣則脈自修長有從容和緩之象又曰短脈者欲長而不能欲速而不達因邪氣克犯正氣正負而邪勝也又曰代脈之現正氣之衰不得不止以息其氣也有痰氣之結壅隔不散亦現代脈者然正氣不衰痰安能作祟使脈中止而不還乎又曰革脈來渾渾而濁亂至擊指者是蓋正氣之欲脫也又曰結脈其來則緩而時又現止是力不能不止也明是正氣甚衰不敢與邪氣相鬥邪氣搏結於一身耳又曰促脈急遽之狀氣耗而勢難寬舒也又曰動脈有不能安靜之勢動極生變也又曰靜脈與動相反不動則不變自享寧靜之福矣又曰毛脈言如羽毛之拂體乃有餘之象火將浮而又息之狀夏秋之間之正脈也在夏則生氣之旺也在秋則旺氣之衰也在他時則熱氣之盛也宜於活看又曰石脈乃沉脈之至藏之極也冬時正脈余時見之為寒冷矣又曰耎脈不能剛健之狀明是力之不勝耳又曰堅脈至硬之狀邪氣深入牢不可破也又曰鉤脈洪而不大之象如鉤之有留也乃胃脈和平火不盛而司其令夏日見之尤為平脈也又曰躁脈似動而非動似數而非數似促而非促似急而非急也若有乾枯煩擾之狀又曰搏脈者擊指之謂也各脈皆能擊指俱屬太過又曰散脈者即解索之兆乃欲留而不能留欲存而不能存也又曰絶脈者言脈之將斷而未斷可續而不續也死亡之時必現此脈又曰平脈者言各脈之得其平也如浮不甚浮沉不甚沉遲不甚遲數不甚數耳人現平脈多是胃氣之全也胃氣無傷又寧有疾病哉此脈之所以貴得平耳又曰鬼真君脈訣止得三十八字然而人之疾病已盡括於其內要在辨其異中之同與同中之異則因常可以通變遇變可以用常隨時隨地隨症隨人無不可起死以回生矣又何必拘拘於日之平旦乘人之清氣診脈治病哉又曰五臟七腑各有脈俱在寸關尺觀之內經分三部之內外前後上下以細察其部位何其詳也而鬼真君獨重五臟將七腑略而不言止將三焦命門以示世又皆不專屬之於腎何其略也不知臟可以包腑而腑不可以包臟論腑太詳必至反遺夫臟矣不若專言五臟治臟而治腑在其中矣三焦乃腑之一何獨舉而言之因世錯認三焦在於腎中故特指明也命門為十二經之主世人不知而以右尺觀之恐失命主之義故鬼真君辨明之也又曰或疑王叔和脈訣因遺落心包遂至傳疑千載今鬼真君之訣將七腑全然不講不更滋甚乎然而切脈止可切五臟也七腑部位內經雖分似乎有一定之理而究難別臟腑之異不若單切五臟論其五行之生克病情反無可遁也此鬼真君不言七腑真是至捷之法亦是至玄之機幸勿作王叔和遺落心包一例而並譏之也又曰脈貴知微然而得其微又甚難也暗中摸索而欲使臟腑之疾病了然手指之間易乎不易乎雖然切脈必須問症症是腑病即以臟之脈合之臟之脈不病便是腑病也治腑而病可愈矣症是臟病亦以臟之脈合之臟之脈病是非腑病也治臟而病亦愈矣苟知此法又何微之不可得哉又曰凡人之脈多不相同不可以此人之脈概論諸彼人也看一人之脈當取其左右兩手之各脈一一而消息之辨其何部獨異乃斷何經之病庶幾得之又曰看脈須看有神無神實是祕訣而有神無神何以別之無論浮沉遲數澀滑大小之各脈按指之下若有條理先後秩然不亂者此有神之至也若按指而充然有力者有神之次也其餘按指而微微鼓動者亦謂有神倘按之而散亂者或有或無者或來有力而去無力者或輕按有而重按絶無者或時而續時而斷者或欲續而不能或欲接而不得或沉細之中倏有依稀之狀或洪大之內忽有飄渺之形皆是無神之脈脈至無神即為可畏當用大補之劑急救之倘因循等待必變為死脈而後救之晚矣又曰人有天生細微之脈不可動曰虛弱當統六部同觀之倘一脈獨旺一脈獨急餘脈皆現細微此非虛弱之脈也旺乃火盛而急乃邪侵也以此消息斷然不差又曰切脈貴先調息吾息調而後可以察病人之息蓋病人之息呼吸不到未有能調者也倘醫者之息不平又何以知病人之息哉故學醫者平日學導引之法則呼吸之間無太過不及自然下指之時息數分明可以察病人之脈也又曰看脈必須看症蓋症所以印證夫脈也夫人之脈不同有天生陰脈而不現之於皮毛之內又將可處看脈故必觀其症候之若何而症候正難辨也或者其起居之靜躁靜為陰而躁為陽也看其飲食之寒熱喜寒為熱而喜熱為寒也問其大小便之燥濕短長燥短為實而濕長為虛也辨其口舌之黃白峭滑黃峭為邪盛而白滑為正衰也是觀症所以濟切脈之窮而切脈所以輔觀症之妙耳第二篇鬼真君曰人身之病變遷原非一致人身之脈紛紜必有殊形故六部之中每顯各異之狀一經之內常呈兼見之端浮而弦浮而數多無定象沉而細沉而遲不少同觀必須統論其精微始可獨斷其真僞故浮而兼滑也必是風痰之盛浮而兼大也決為氣血之邪浮而兼遲也虛風之害浮而兼濡也濕氣之侵浮而兼細也血隨氣而上升浮而兼洪也火得氣而更旺浮而兼芤定為血泛之虞浮而兼緊決至邪重之苦浮而兼急必疼痛於上焦浮而兼弱必委靡於下部浮而兼長氣雖升而不傷其正浮而兼短氣欲結而難散其邪浮而兼結邪搏於經絡之間浮而兼革正脫於臟腑之內浮而兼代邪居於胸膈之處浮而兼促正傷於營衛之中浮而兼動氣在變遷浮而兼靜氣將寧息浮而兼毛氣得火而上騰於頭目浮而兼躁火因氣而上炎於咽喉浮而兼鉤氣升之和浮而兼搏氣浮之極浮而兼耎氣虛之甚浮而兼散氣不可收浮而兼平氣乃無病沉而兼遲也寒虛之至沉而兼澀也鬱滯之深沉而兼滑也寒痰之不舒沉而兼小也冷氣之難發沉而兼實也氣得寒而不揚沉而兼微也精因冷而欲脫沉而兼細也血逢陰凝之象沉而兼緊也邪乘寒冷之徵沉而兼急小腹有寒邪之痛沉而兼濡兩足多水脹之侵沉而兼長氣陷而正尚未傷沉而兼短精冷而邪將不渙沉而兼結邪搏於至陰沉而兼革正脫於髓海沉而兼代命門將絶而可危沉而兼促元陽欲脫而可畏沉而兼靜陽寒能守沉而兼石陰固不遷沉而兼耎腹冷有痛楚之苦沉而兼散精寒有涸絶之危更有濡遲兼見無非濕犯乎虛濡滑同來尤是痰成乎水濡中兼大濕因血耗以相侵濡中兼小水趁氣衰以相犯濡而兼弦風水之患深濡而兼芤痰血之症急濡而兼長水濕易散濡而兼革水濕難消濡而兼動水有泛濫之盛濡而兼靜濕多浸潤之微濡而兼耎水邪乘虛而相生濡而兼散正氣隨濕而欲脫遲而兼澀郁中以成弱遲而兼滑濕內以招虛遲而兼大氣血皆居乾燥遲而兼小精神必至伶仃遲而兼微虛寒之氣遲而兼細匱乏之身遲而兼弦內傷之風遲而兼芤內傷之血遲而兼長病不足畏遲而兼短症實可愁遲而兼代必至損傷脾胃遲而兼革定然渙散精華遲而兼石氣寒將侵於骨遲而兼耎血衰少養乎心遲而兼散寒極而氣飛遲而兼靜陰微而精固數而兼滑亢炎之痰數而兼大沸騰之火數而兼實氣壅於熱數而兼弦火助乎風數而兼洪熱有燎原之盛數而兼緊邪有烽火之傳數而兼芤吐血何狂數而兼代喪軀必速數而兼革走陽可許數而兼促消正堪憂數而兼動恐有發狂之變數而兼毛定多消渴之成數而兼搏火刑金而喉舌無津數而兼躁火燒心而脾胃生焰澀中兼小氣血虧而鬱志莫伸澀中兼實氣血壅而思想難遂澀中兼微氣寒而滯澀中兼細血少而愁澀中兼洪鬱怒不解澀中兼急郁痛安禁澀中兼結邪搏於兩脅之間澀中兼促正虧於半表之際澀中兼革氣欲脫於腎肝澀中兼代氣將絶於脾胃澀中兼石寒鬱不宣澀中兼堅風鬱難出澀中兼搏郁甚莫解澀中兼靜鬱極安移滑而兼大痰借血以為災滑而兼小痰借氣而作祟滑而兼實氣塞於痰中滑而兼微痰冷於胸次滑而兼細痰旺而血枯滑而兼弦水盛而風急滑而兼洪濕熱成黨滑而兼芤痰血為疴滑而兼緊邪得濕以助威滑而兼急邪乘濕而增痛滑而兼濡濕盛恐邪氣之添脹滑而兼革水多防正氣之難收滑而兼動水畜致腸腹之鳴滑而兼毛火沸召痰涎之吐滑而兼耎濕痰積而不消滑而兼堅濕邪留而不散滑而兼搏痰有傾盆之嘔滑而兼散水如走石之崩餘脈俱可類推各經正當細晰總以脾胃之氣為要更以平緩之脈為先倘下指之時均有寧靜之致庶幾藥餌之用可許康健之祥矣陳士鐸曰凡人之病變遷不常而脈亦因病殊形必非一狀大約一經之中必兼二脈以相見也合二脈以論症而症始出焉合二脈以用藥而藥始當焉但二脈兼見甚多不止浮沉遲數澀滑濡也然苟知兼見之大旨則以七脈為綱以餘脈為紀又何病之不可推測哉又曰脈有同中之異亦有異中之同同是浮脈而何以有各脈之異同是沉脈而何以有各脈之殊蓋脈無一定之形必兼兩脈而並見也兩脈既然並見合兩脈以治一病自易見功然而兩脈之現必察其同異知其同中之異竟治其異而不必顧其同知其異中之同竟治其同而不必顧其異從此消息醫道烏得不神哉又曰千態萬狀者病也千變萬化者脈也鬼真君以三十八字盡脈之理毋乃太簡乎故又取兼見之脈以示世似乎克盡其變矣然而兼見之脈止取浮沉遲數澀滑濡之七脈而其餘三十一脈不言兼見或疑其訣之不全而立法之未善也不知脈之大綱而浮沉遲數澀滑之六字耳舉其大綱而余可類推又何必瑣細之盡告哉吾意於浮沉遲數澀滑之外引濡脈之兼見者亦可無事重宣耳鬼真君惟恐人之拘執而不通也故略舉一濡脈以訓世耳又曰兼見之脈須先看七脈為主既得七脈而後辨其兼見之形則同中之異與異中之同無難細得也以七脈為綱以兼見為緯實切脈之權輿也又曰切脈實難而辨其異同不尤難乎然而無難也知浮沉遲數澀滑濡之七脈而其餘三十一脈兼而察之則其病可意會也況鬼真君又明告之乎細讀此訣亦何患脈之難知而病之難識哉又曰人疑兼見之脈不止鬼真君所示寥寥數語恐不足以包萬病也殊不知脈訣言愈多而脈愈晦鬼真君之訣妙在於少也以少勝多非便世人之習誦也實其脈訣神奇足以包舉萬病耳又曰脈理細微須辨其同中之異異中之同同中之異者如同是浮脈何以有大小虛實之異也如同是沉脈何以有遲數澀滑之異也異中之同者如寸關尺各現大小虛實之異而浮脈則同也上中下各現遲數澀滑之異而沉脈則同也知其同中之異則竟治其異知其異中之同則不必治其同於此消息何患脈理之不精哉第三篇鬼真君曰五臟之病必以寸關尺為憑七腑之症亦以寸關尺為據然不分晰其精微又何能盡知其玄妙試觀其寸口也左寸見浮風熱上越而頭疼右寸見浮咽喉中燥而鼻塞左寸見芤胸難藏血而嘔吐右寸見芤胃多瘀血而痛疼左寸見滑熱痰入心而舌強右寸見滑熱痰侵肺而皮折左寸見實火焚心而面赤右寸見實火生胃而唾干左寸見弦風入體必多頭痛右寸見弦風入腸定有筋攣左寸見緊邪盛而心痛右寸見緊氣嗽而肺傷左寸見洪心胸起熱悶之燒右寸見洪頭腦生炎蒸之楚左寸見微心寒而虛弱何辭右寸見微氣冷而崩陷難免左寸見沉心君失相火之助右寸見沉肺金召寒氣之侵左寸見澀心脈火鬱而未舒右寸見澀肺金金鬱而莫達左寸見遲膻中虛乏而難以衛心右寸見遲上焦損傷而難以生氣左寸見伏氣匿於脅間右寸見伏氣積於脘內左寸見濡膀胱水畜而不消右寸見濡皮毛汗泄而未止左寸見弱無血以養心右寸見弱乏氣以生胃左寸見大心經血燥而怔忡右寸見大肺經血乾而閉結左寸見小驚悸時生右寸見小怯弱日甚左寸見虛心中恍惚右寸見虛胃內衰微左寸見細運行乏力右寸見細言語無神左寸見微包絡有寒邪之入右寸見微胸脘有陰氣之招左寸見急心疼不免右寸見急喉痛安辭左寸見短三焦之氣自怯右寸見短再宿之食難消左寸見代心痛勿訝右寸見代痰塞何妨左寸見結邪搏於心包右寸見結邪蟠於胃脘左寸見促積聚有煩悶之苦右寸見促留滯興痞滿之憂左寸見革心氣散漫而不收右寸見革肺氣飛越而不返左寸見動歡娛妊子之祥右寸見動飲食傷氣之兆左寸見毛心火動而將刑肺金右寸見毛肺火起而將克肝木左寸見鉤心氣安而夢魂適右寸見鉤肺氣肅而膀胱通左寸見堅邪犯心而呼號右寸見堅邪侵肺而咳嗽左寸見躁無血養神右寸見躁無精定魄左寸見搏火太過而焚心右寸見搏火太過而爍肺左寸見石陰寒直搗於膻中右寸見石冷氣逼居於脘內左寸見散心有無可奈何之象右寸見散肺有但出無入之悲試觀其關中也左關見浮肝犯風而眼赤右關見浮胃入風而渴生左關見芤必肝傷而失血右關見芤必腸毒而便膿左關見滑頭目腫痛堪嗟右關見滑脾胃熱焚甚苦左關見實痎癖可徵右關見實心腹多痛左關見弦肝旺生風右關見弦脾崩不食左關見緊筋脈急拘右關見緊嘈雜嘔吐左關見洪眼目生花右關見洪心腹結痛左關見沉必陰寒之癖積右關見沉定冷氣之難安左關見澀風邪寒閉因氣鬱而有餘右關見澀飲食傷殘實血虛之不足左關見遲兩脅多寒右關見遲中焦微冷左關見伏關格收藏右關見伏霍亂吐瀉左關見濡疸症將成右關見濡水臌可畏左關見弱筋痿宜防右關見弱氣短鬚補左關見數肝火盛而目紅右關見數胃火旺而口渴左關見大怒氣傷肝右關見大狂陽傷胃左關見小肝膽氣衰右關見小脾胃血少左關見虛必益其血右關見虛須補其津左關見微溫其下元之憊右關見微暖其氣海之寒左關見細慮腳膝之酸右關見細恐肚腹之瀉左關見急肝痛而不能眠右關見急脾傷而自難臥左關見代肝絶而痛則無妨右關見代肝絶而安則無救左關見結胸滿而痰結於中右關見結脾傷而滯氣於下左關見促肝無腎水之滋右關見促脾無腎火之養左關見革氣脫於木旺之時右關見革氣脫於土崩之候左關見動兩脅有氣痛之愁右關見動中焦有火焚之懼左關見毛肝木旺而生風右關見毛胃土盛而動火左關見耎無病之人右關見軟加粲之客左關見鉤肝血之足右關見鉤脾氣之安左關見靜優遊享無事之福右關見靜舒暢享強食之愈左關見石筋得寒而拘攣右關見石胃因冷而泄瀉左關見堅邪必留戀於經絡右關見堅邪必會聚於臟腑左關見躁必苦血乾而多怒右關見躁必苦液涸而善嘔左關見搏防太盛之中風右關見搏慮過旺之狂病左關見散筋馳而不能收右關見散肢解而不可舉試觀其尺下也浮見尺左水虧而雙耳齊聾浮見尺右火旺而大腸自祕芤見尺左小遺多膿血之災芤見尺右大便下赤紅之歡滑見尺左水入腰而作楚滑見尺右痰流足以成痹實見尺左膀胱水閉而不通實見尺右溺瀝火澀而難出弦見尺左腰腹重滯生疼弦見尺右腎臟風邪作耗緊見尺左耳似蟬鳴緊見尺右臍同蟲咬洪見尺左水熬干而消渴洪見尺右火炎上而夢遺微見尺左盜汗淋漓微見尺右腸鳴泄瀉沉見尺左精冷如冰沉見尺右腰寒若水澀見尺左陰寒疝結澀見尺右逆冷腸崩遲見尺左下焦寒冷遲見尺右小腹陰凝伏見尺左陽氣不升伏見尺右陰氣更閉濡見尺左寒濕侵骨濡見尺右冷痿中腰弱見尺左雙足骨酸弱見尺右兩腿氣乏大見尺左腎涸於遺精大見尺右命殘於作用小見尺左水耗無多小見尺右火衰不旺虛見尺左心腎不交虛見尺右水火皆乏微見尺左冷入關元微見尺右寒通腹裡細見尺左髓冷脛枯細見尺右命寒精泄數見尺左水少而火沸為痰數見尺右火炎而水隨作喘急見尺左痛入陰丸急見尺右疼添小腹短見尺左自無延齡之福短見尺右定含怯戰之羞代見尺左精敗欲絶代見尺右火熄將亡結見尺左邪襲水而不散結見尺右邪乘火而不離促見尺左髓耗而足難行步促見尺右火衰而氣不通心革見尺左玉關不閉革見尺右河車俱焚動見尺左定然魂夢多遺動見尺右定然陽強不倒毛見尺左精耗而龍火將興毛見尺右焰騰而命門自熱耎見尺左腎弱相宜耎見尺右火衰當助鉤見尺左陰平之士鉤見尺右陽祕之徒靜見尺左閉關可信靜見尺右守真無疑石見尺左精無傾失之慨石見尺右陽有退藏之慶堅見尺左邪入於骨髓堅見尺右邪居於腰膝躁見尺左腎難上交於心躁見尺右陽且高越於膈搏見尺左膀胱越熱閉之淋搏見尺右咽喉長瘡蛾之腫散見尺左腎水欲絶於須臾散見尺右元陽將逃於頃刻此皆六部之專主亦即各脈之旁通然而各脈之中緩急為要六部之內長脈為宗脈長而命根深脈緩而胃氣在故上中下必取其緩而寸關尺必尚其長也陳士鐸曰脈有兼見以觀其變必有獨現以顯其常常變之道不可不分觀之也鬼真君先言其變示變之宜知也再言其常示常之宜諳也知常而後達變又寧至有治常之失哉又曰脈不分觀部位則病情不可得而知此寸關尺必須分觀其脈也又曰脈有寸關尺無脈而脈見於列缺之間者世人以為反關脈也此乃經脈虛而絡脈盛也經脈虛故不現於寸關尺之三部絡脈盛故現於列缺之間蓋直行為經而旁出為絡列缺正絡脈之穴也在兩手交叉食指盡處兩筋骨罅中屬肺經之絡別走陽明之絡也此中原有動脈宜細動而不宜大動今寸關尺三部無脈而此處之脈大動亦現三部之象是陽勝於陰也千金翼謂陽脈逆反大於寸口三絡正謂反關脈也亦當分觀其動以別疾病耳又曰寸關尺分上中下也心肺居上而以寸觀之象天也肝脾居中而以關觀之象人也腎居下而以尺觀之象地也醫道必合天地人以論醫則醫無剩義脈訣亦必合天地人以示法則法無遁情非好作廣大之語也實有不如此則其法為不備耳又曰寸關尺分上中下切之是矣然其中有上而兼中者有中而兼下者有中而兼上下者又不可不知之也如寸脈浮而連於關關脈數而連於尺如關脈大而連於寸尺者是也此又當合寸關尺而同觀又不可專主於寸而不及關專主於關而不及寸尺又在臨症切脈而變通之也又曰脈宜分觀以別虛實然又有合寸關尺以分虛實者大約左之寸關尺齊旺者乃外感居多右之寸關尺齊旺者乃內傷居多非單左寸旺為外感右寸旺為內傷也又曰寸關尺分觀之後又宜合觀不分觀不知其細不合觀不得其和故分觀之時當以一指切其脈合觀之時又當以三指切其脈也又曰看寸關尺三部之脈先切關脈而後看寸脈由寸脈而後看尺脈左右相同又曰今人看脈男先看左女先看右男女之脈何常有異正不必如此拘拘也又曰凡人脈貴有胃氣胃氣者平氣也毋論寸關尺下指之時覺有平和之象即是有胃氣也非獨右關平和始有胃氣耳又曰脾與胃為表裡胃病則脾必病脾病則胃亦病病安有胃氣哉故脾脈與胃脈同觀所以脾胃之脈皆在右關切之耳又曰胃旺而脈愈微胃衰而脈愈盛故右關太旺反是胃氣之虛也然而右關之旺又由於左關之旺也左關旺而右關不能衰此木來剋土之象又不可不知之也又曰三部之脈前人以尺脈為根似乎切脈重在尺也不知本實先撥固然枝葉難榮然而過於摧殘如狂風大雨拔木折枝根亦隨竭此脈所以必統三部而分觀之也又曰寸關尺各有內外之分尺外尺裡關外關裡寸外寸裡皆從左右以分內外而非上下以分內外也余注內經已詳哉言之矣而鬼真君不言及此者蓋舉其要而示人耳又曰脈分三部上寸也中關也下尺也寸之內又分左右左寸候心而包絡膻中統其內右寸候肺而胸脘咽喉統其內關之內又分左右左關候肝而膽脅膈則統其內右關候脾而胃則統其內尺之內又分左右左尺候腎之水而小腸膀胱小腹股膝統其內右尺候腎之火而大腸腰口脛胻統其內三焦有上焦中焦下焦之異上焦屬於寸中焦屬於關下焦屬於尺不可於右腎候之也命門為十二經之主不屬於右腎而不得不候之於右腎也部位既明切脈自無疑又曰鬼真君所分之部位一皆準於內經與王叔和所定大相懸殊世人見之未有不驚異者也然而鬼真君正恐人驚異單言五臟而不言七腑鐸慮部位不明又將何以診脈故於前條細列以問世第推鬼真君之意但知五臟之脈正不必又及七腑之脈也鐸重言之似乎饒舌矣又曰五臟各有表裡心則與小腸為表裡也肝則與膽為表裡也肺則與大腸為表裡也脾則與胃為表裡也腎則與膀胱為表裡也表病則里病原相關切故治里正所以治表也何必分表是表而不屬之於臟里是里而不屬之於腑哉第四篇鬼真君曰診脈宜分生死決日當定時辰傷寒熱病洪大生而沉細死産後熱病緩滑吉而弦急凶頭痛之疴生於浮滑而死於短澀腹脹之症死於虛小而生於大浮下痢活於微小浮洪反有難療之嘆癲狂全於實大沉細轉興莫救之憂消渴數大有生機虛小愁其陰盡霍亂浮洪無死法微遲慮彼陽亡中風最喜遲浮急實者何能起死中惡偏宜緊細浮大者不易回生心疼沉細非比浮大之難醫水氣大浮不似沉細之莫療吐血鼻衄沉弱沉細者生實大浮大俱為亡兆中毒腸澼洪大滑大者吉微細滑細各是危徵喘急宜浮滑短澀云亡咳嗽尚浮濡沉伏決斃久瀉反宜微細浮洪者多致歸陰新産切忌大弦緩滑者寧憂辭世嘔吐虛細者吉實大則艱於奏功癆瘵浮滑者佳細數則難以取效盜汗惟嫌緊數虛小無愁失血止慮浮洪細弱可喜內實者吉在浮洪沉細有變遷之禍內虛者吉在沉細浮大無存活之祥痹症尤嫌浮大細澀長延厥病更忌緊弦洪數即解癥瘕見細微而可喜弦滑者危眩冒見浮滑而相宜沉澀者重黃疸不宜急數遲滑易於分消白淋偏貴濡遲澀弱艱於止遏便閉生於微細洪大有陰盡之傷發汗生於虛小弦洪有陽亡之失腹痛沉伏多入泉臺脅痛芤大定趨死路脫癥結代難留人世喘症促革易走冥途關格澀伏常登鬼録癰疽滑大轉慶生緣結胸現沉緊半寄於死亡臟結現浮滑速痊於淹滯直中陰經喪淪代結忽成熱病全活浮洪發斑洪大未是死徵噎隔數細實非生氣偏枯之症弦滑何愁歪斜之疴數大可治噤口之痢結澀不易療中暑之症沉伏不須驚循衣摸床細小尤堪救援遺尿撒手促革必至喪捐筋青囊縮微短殞歿舌黑髮直數大焦枯臍突唇裂結代應歿口張足腫短促何延厄逆不止短散就木懊憹無休微弱加餐血暈散促頃刻歸陰腸結搏堅旦夕歌露更有帶鉤之象心死可定於九日彈石之狀腎死必絶於七朝弓弦之張肝死定亡於十八釜沸之亂脾死可決於四三浮水之景肺死應喪於十二也尚有祕法可以罄傳於萬年如見前形不必問現於何臟見蝦游而斷八日之必死見雀啄而決七日之必亡見吹毛而言四日之必危見奪索而許一日之必逝見屋漏而定五月之必隕其餘死亡可據推斷陳士鐸曰死亡之脈不盡於此然而得此正易決存亡也又曰素問靈樞載死亡之脈甚備二書參觀更無差錯又曰死亡之脈全在看脈之有神無神有神者有胃氣也無神者無胃氣也故有胃氣雖現死脈而可生無胃氣即現生脈而必死又在臨症而消息之也又曰脈現死亡不可輕斷死期往往有用藥得宜雖不能起死為生然延留數日亦其常也訣中篇末有決日之法愚以為終非定論但斷其必死而不必先定其日期當與高明共商之又曰死亡之脈現之於驟者易救以臟腑初絶尚有根可接也倘時日已久雖有人參又何以生之於無何有之鄉哉有無可如何者矣又曰脈有細微欲絶者多是死亡之脈然脈有伏而不出狀似細微欲絶其實絶而未絶也一出脈而細微之象如失此等之脈最難辨別又當合症而參觀之未可全恃夫切脈也又曰脈有生死之各別如魚遊雀啄之類彈石解索屋漏水流吹毛之狀自是死脈無疑見此等之脈即可決其必亡苟無此等之現似乎不宜遽言其死不知脈貴有神倘浮沉遲數之間澀滑大小之際初按若有再按若無或散或亂或來或去全無神氣雖非旦夕之云亡必至歲月之難久何常非死脈哉倘代結之脈按之有神不過痰涎之壅塞寒痛之遏抑暫時之病未常非生也故決人生死全要看脈之有神無神為貴耳第五篇婦人小兒脈訣鬼真君曰陰陽原無二道男女何有殊形五臟相同不必兩分彼此三部亦一寧須各論參差惟受娠成胎獨殊男子故辨妊論孕更別婦人尺中脈滑女經不調且有帶淋之病關中脈澀天癸已斷寧非鬱塞之疴左寸滑而左尺大懷子之兆左尺數而左關微有兒之徵左寸帶縱兩男之祥右寸帶縱雙女之喜左關左尺脈皆大心脈流利必三男右關右尺脈皆大心脈流利必三女然三部有一部之滯未宜遽許為胎各脈無一脈之順何敢輕言是孕子死母存尺浮而寸沉母亡子活尺澀而寸伏蓋子繫於腎尺浮則子無生氣母系於肺寸沉則母有生機子繫於尺尺澀而子之氣不散母系於寸寸伏而母之根已離沉細之脈胎欲離經浮滑之脈胞將即産腹疼腰痛定然即降漿來胞破未可言生身重體寒面又青脈無可畏心煩血燥舌兼黑脈斷堪憂子母難留唇口沫出娘兒全活面鼻顏黃新産脈緩自存胃氣新産脈滑未損脾陰實大既形定非佳信弦急兼現豈是庥祥沉小實為順候澀促半作逆觀脈微何是害尚可回陽脈洪反宜愁最嫌逆冷婦人之脈若此小兒之診若何三部不妨俱數只慮沉遲六經各喜均長翻嫌細小惟弦緊不可驟揚恐來風邪之祟更虛濡不宜長見虞多水氣之殃急脈形於指下嘔吐而腹痛難痊大脈浮於關前瀉痢而心驚不救見此已可通彼知偏何難悟全哉陳士鐸曰男女之病彼此相同原無反背故有病可據露而同斷也惟胎産前後少異於男子故鬼真君又傳此篇而於論孕娠獨詳也至於小兒原不必切脈以氣血未全各脈不十分全准鬼真君之論小兒亦約略之辭然而小兒純陽所生之病多是飲食之傷驚疳吐瀉之症得此數言以括其全所謂要言不煩也又曰婦人之脈少異於男子者左尺多旺耳男子左尺旺實非佳兆女子左尺旺此陰血有餘轉是佳祥蓋易於受胎也又曰婦人之病最難治者以其性情多郁耳鬱則氣血即不流通經輒閉塞而左關隨現澀脈矣故看婦人之脈貴切肝脈辨其澀與不澀是第一祕法雖各經皆有澀脈而左關不澀其鬱未甚也又曰小兒之脈弦緊弦急俱是外邪除此之外皆內傷也治內傷之法以補脾健胃為先即治外邪亦當顧正雖脈純現弦緊弦急未可單祛外邪也
